<!DOCTYPE html>
<html>
<head>
    <title>Practical 12 - Event Handling</title>
    <style>
        img {
            width: 300px;
            height: 200px;
        }
    </style>
</head>
<body>

<h1 id="heading">Event Handling Example</h1>

<!-- onclick event -->
<button onclick="changeText()">Click Me</button>

<br><br>

<!-- onmouseover event -->
<p onmouseover="hoverEffect()">Hover over this text</p>

<br><br>

<!-- Slideshow -->
<h3>Image Slideshow</h3>
<img id="slide" src="images/funny-cat-memes-go-hard-cover_675.jpg">

<script>
    // -------- onclick --------
    function changeText() {
        document.getElementById("heading").innerHTML = "Button Clicked!";
    }

    // -------- onmouseover --------
    function hoverEffect() {
        document.getElementById("heading").style.color = "red";
    }

    // -------- Image Slideshow --------
    let images = [
        "images/funny-cat-memes-go-hard-cover_675.jpg",
        "images/post-the-best-cat-memes-you-got-in-the-comments-please-v0-kg82lbnu0ste1.webp",
        "images/swag-cat-swagbilli-cutecat-cats-cat-swag-ok-yooo-yo.gif"
    ];

    let index = 0;

    function changeImage() {
        document.getElementById("slide").src = images[index];
        index = (index + 1) % images.length;
    }

    // setInterval for slideshow
    setInterval(changeImage, 2000);

    // setTimeout example
    setTimeout(function() {
        alert("Slideshow started!");
    }, 1000);
</script>

</body>
</html>
